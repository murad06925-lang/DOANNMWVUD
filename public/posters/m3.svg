<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="600" fill="url(#bg)"/>
  <circle cx="320" cy="110" r="130" fill="#fde047" opacity="0.15"/>
  <circle cx="80" cy="520" r="170" fill="#22c55e" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="28" y="28" width="344" height="544" rx="28" fill="rgba(2,6,23,0.55)" stroke="rgba(255,255,255,0.18)"/>
  </g>

  <text x="48" y="110" fill="#e2e8f0" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="700" letter-spacing="3">
    CINTour - MOVIE POSTER
  </text>

  <text x="48" y="220" fill="#ffffff" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="44" font-weight="950">
    LAT MAT 7
  </text>

  <text x="48" y="290" fill="#cbd5e1" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="600">
    Genre: Drama
  </text>
  <text x="48" y="315" fill="#cbd5e1" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="600">
    Duration: 138 min
  </text>

  <g transform="translate(48 410)">
    <rect width="304" height="44" rx="14" fill="rgba(16,185,129,0.92)"/>
    <text x="152" y="29" text-anchor="middle" fill="#0b1220" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="900" letter-spacing="2">
      NOW SHOWING
    </text>
  </g>
</svg>

