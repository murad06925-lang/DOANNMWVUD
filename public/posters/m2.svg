<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="600" fill="url(#bg)"/>
  <circle cx="320" cy="90" r="120" fill="#22c55e" opacity="0.18"/>
  <circle cx="80" cy="540" r="160" fill="#f59e0b" opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="28" y="28" width="344" height="544" rx="28" fill="rgba(2,6,23,0.55)" stroke="rgba(255,255,255,0.18)"/>
  </g>

  <text x="48" y="110" fill="#e2e8f0" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="700" letter-spacing="3">
    CINTour - MOVIE POSTER
  </text>

  <text x="48" y="210" fill="#ffffff" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="36" font-weight="900">
    DORAEMON
  </text>
  <text x="48" y="255" fill="#ffffff" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="24" font-weight="800">
    DAO GIAU VANG
  </text>

  <text x="48" y="320" fill="#cbd5e1" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="600">
    Genre: Animation
  </text>
  <text x="48" y="345" fill="#cbd5e1" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="600">
    Duration: 105 min
  </text>

  <g transform="translate(48 410)">
    <rect width="304" height="44" rx="14" fill="rgba(239,68,68,0.92)"/>
    <text x="152" y="29" text-anchor="middle" fill="#fff" font-family="system-ui,Segoe UI,Roboto,Arial" font-size="14" font-weight="900" letter-spacing="2">
      PREMIUM BOOKING
    </text>
  </g>
</svg>

